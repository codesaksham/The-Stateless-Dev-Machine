<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat - PMCR</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f10;
    color: #e8e8e8;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Chat layout ─────────────────────────────────── */
  #chat-screen {
    display: flex;
    width: 100%;
    height: 100dvh;
    max-width: 1200px;
    flex-direction: row;
    background: #151518;
    box-shadow: 0 50px 100px rgba(0,0,0,0.5);
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid #2a2a2e;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 20px;
    background: #111114;
  }

  #sidebar h2 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #555;
  }

  #user-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    flex: 1;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 14px;
    color: #aaa;
    transition: all 0.2s;
    cursor: pointer;
  }
  .user-pill:hover { background: #1a1a1e; color: #fff; }

  .user-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3cba6e;
    box-shadow: 0 0 10px rgba(60, 186, 110, 0.4);
  }

  .user-pill.me { color: #fff; font-weight: 600; background: #1a1a1e; }

  .admin-link {
    margin-top: auto;
    padding: 12px;
    background: #2a2a2e;
    color: #fff;
    text-decoration: none;
    text-align: center;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
    display: none;
  }
  .admin-link:hover { background: #3a3a40; }

  /* Main chat area */
  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #chat-header {
    padding: 20px 30px;
    border-bottom: 1px solid #2a2a2e;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #chat-header .title { font-size: 16px; font-weight: 600; }
  #chat-header .status { font-size: 12px; color: #555; display: flex; align-items: center; gap: 6px; }
  #chat-header .logout { color: #888; text-decoration: none; font-size: 13px; }
  #chat-header .logout:hover { color: #fff; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  /* Message bubbles */
  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    position: relative;
  }

  .msg-row.mine { align-self: flex-end; align-items: flex-end; }
  .msg-row.theirs { align-self: flex-start; align-items: flex-start; }

  .msg-name {
    font-size: 11px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
    padding: 0 4px;
  }

  .msg-bubble {
    padding: 12px 18px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.6;
    word-break: break-word;
    position: relative;
    transition: transform 0.2s;
  }

  .mine .msg-bubble {
    background: #fff;
    color: #000;
    border-bottom-right-radius: 4px;
  }

  .theirs .msg-bubble {
    background: #232328;
    color: #fff;
    border-bottom-left-radius: 4px;
    border: 1px solid #2a2a2e;
  }

  .msg-time {
    position: absolute;
    bottom: -20px;
    font-size: 10px;
    color: #555;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .mine .msg-time { right: 4px; }
  .theirs .msg-time { left: 4px; }

  .msg-bubble:hover + .msg-time, .msg-time:hover {
    opacity: 1;
  }
  .msg-row:hover .msg-time { opacity: 1; }

  /* Tagging style */
  .mention {
    color: #3cba6e;
    font-weight: 600;
    background: rgba(60, 186, 110, 0.1);
    padding: 0 4px;
    border-radius: 4px;
  }
  .mine .mention {
      color: #000;
      background: rgba(0, 0, 0, 0.1);
      border: 1px dashed #000;
  }

  /* System messages */
  .sys-msg {
    align-self: center;
    font-size: 11px;
    color: #555;
    padding: 6px 16px;
    border-radius: 20px;
    background: #1a1a1e;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Input bar */
  #input-container {
    padding: 24px 30px;
    border-top: 1px solid #2a2a2e;
  }
  #input-bar {
    display: flex;
    gap: 12px;
    background: #1c1c21;
    padding: 8px;
    border-radius: 16px;
    border: 1px solid #2a2a2e;
    align-items: center;
  }

  #msg-input {
    flex: 1;
    padding: 10px 14px;
    border: none;
    background: transparent;
    color: #fff;
    font-size: 15px;
    outline: none;
  }

  #send-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    background: #fff;
    color: #000;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #send-btn:hover { transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 4px; }

  @media (max-width: 768px) {
    #sidebar { display: none; }
  }
</style>
</head>
<body>

<div id="chat-screen">
  <div id="sidebar">
    <h2>Active Members</h2>
    <div id="user-list"></div>
    <a href="/admin" id="admin-btn" class="admin-link">Admin Dashboard</a>
  </div>
  
  <div id="chat-area">
    <div id="chat-header">
      <div class="title">Chat Room</div>
      <div class="status"><span id="header-name"></span> <a href="#" class="logout" onclick="logout()">Logout</a></div>
    </div>
    
    <div id="messages"></div>
    
    <div id="input-container">
        <div id="input-bar">
          <input id="msg-input" type="text" placeholder="Type a message... (use @ to tag)" maxlength="1000" autocomplete="off" />
          <button id="send-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('pmcr_token');
  if (!token) window.location.href = '/login';

  const messages    = document.getElementById('messages');
  const msgInput    = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const userList    = document.getElementById('user-list');
  const headerName  = document.getElementById('header-name');
  const adminBtn    = document.getElementById('admin-btn');

  let ws = null;
  let myUsername = '';
  let onlineUsers = [];

  function logout() {
    localStorage.removeItem('pmcr_token');
    window.location.href = '/login';
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url = `${proto}://${location.host}/ws/${encodeURIComponent(token)}`;
    ws = new WebSocket(url);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'error') {
        alert(data.message);
        logout();
        return;
      }

      if (data.type === 'welcome') {
        myUsername = data.message.split(',')[1].replace('!', '').trim(); // "Welcome, username!"
        // Actually the server could send the username explicitly, but I'll decode from token or just parse here.
        // Let's assume server sends it nicely. I updated main.py to send is_admin.
        headerName.textContent = myUsername;
        if (data.is_admin) adminBtn.style.display = 'block';
        appendSystem(data.message);
        onlineUsers = data.users;
        updateUserList(data.users);
        return;
      }

      if (data.type === 'system') {
        appendSystem(data.message);
        onlineUsers = data.users;
        updateUserList(data.users);
        return;
      }

      if (data.type === 'message') {
        appendMessage(data.from, data.message, data.from === myUsername, data.timestamp);
        onlineUsers = data.users;
        updateUserList(data.users);
        return;
      }
    };

    ws.onclose = () => {
        appendSystem('Disconnected. Reconnecting...');
        setTimeout(connect, 3000);
    };
  }

  sendBtn.addEventListener('click', () => {
    const text = msgInput.value.trim();
    if (!text || !ws) return;
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    ws.send(JSON.stringify({ message: text }));
    appendMessage(myUsername, text, true, now);
    msgInput.value = '';
    msgInput.focus();
  });

  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendBtn.click(); });

  function highlightMentions(text) {
    // Regex to find @username where username is in onlineUsers
    let highlighted = escapeHtml(text);
    onlineUsers.forEach(user => {
        const regex = new RegExp(`@${user}\\b`, 'g');
        highlighted = highlighted.replace(regex, `<span class="mention">@${user}</span>`);
    });
    return highlighted;
  }

  function appendMessage(from, text, isMine, timestamp) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');

    if (!isMine) {
      const name = document.createElement('div');
      name.className = 'msg-name';
      name.textContent = from;
      row.appendChild(name);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = highlightMentions(text);
    row.appendChild(bubble);

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timestamp;
    row.appendChild(time);

    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function appendSystem(text) {
    const el = document.createElement('div');
    el.className = 'sys-msg';
    el.textContent = text;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
  }

  function updateUserList(users) {
    userList.innerHTML = '';
    users.forEach(u => {
      const pill = document.createElement('div');
      pill.className = 'user-pill' + (u === myUsername ? ' me' : '');
      pill.innerHTML = `<span class="dot"></span><span>${escapeHtml(u)}${u === myUsername ? ' (you)' : ''}</span>`;
      pill.onclick = () => {
          msgInput.value += `@${u} `;
          msgInput.focus();
      };
      userList.appendChild(pill);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  connect();
</script>
</body>
</html>
