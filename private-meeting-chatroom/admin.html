<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - PMCR</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f12;
    color: #e8e8e8;
    padding: 40px;
    display: flex;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 800px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }
  h1 { font-size: 28px; letter-spacing: -0.5px; }
  .btn-back {
    text-decoration: none;
    color: #888;
    font-size: 14px;
    padding: 8px 16px;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .btn-back:hover { background: #1a1a1e; color: #fff; }

  .card {
    background: #151518;
    border: 1px solid #2a2a2e;
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
  }
  h2 { font-size: 18px; margin-bottom: 20px; color: #888; }

  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  input {
    flex: 1;
    padding: 12px 16px;
    background: #0c0c0e;
    border: 1px solid #2a2a2e;
    border-radius: 10px;
    color: #fff;
    outline: none;
  }
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #888;
    margin-right: 12px;
  }
  button.add-btn {
    padding: 12px 24px;
    background: #e8e8e8;
    color: #0f0f12;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th { text-align: left; font-size: 12px; text-transform: uppercase; color: #555; padding: 12px 16px; border-bottom: 1px solid #2a2a2e; }
  td { padding: 16px; border-bottom: 1px solid #1a1a1e; font-size: 14px; }
  .badge {
    padding: 2px 8px;
    background: #2a2a2e;
    border-radius: 4px;
    font-size: 10px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .badge.admin { background: #3a3a40; color: #fff; }
  
  .delete-btn {
    background: transparent;
    border: 1px solid #3d2a2a;
    color: #e05c5c;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .delete-btn:hover { background: #3d2a2a; color: #fff; }
  .delete-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>User Management</h1>
      <a href="/chat" class="btn-back">Back to Chat</a>
    </header>

    <div class="card">
      <h2>Add New User</h2>
      <div class="form-row">
        <input type="text" id="new-username" placeholder="Username">
        <input type="password" id="new-password" placeholder="Password">
        <div class="checkbox-group">
          <input type="checkbox" id="is-admin">
          <label for="is-admin">Admin</label>
        </div>
        <button class="add-btn" onclick="addUser()">Add User</button>
      </div>
      <div id="form-error" style="color: #ff5f5f; font-size: 13px;"></div>
    </div>

    <div class="card">
      <h2>Existing Users</h2>
      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-table-body">
          <!-- Users dynamic -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('pmcr_token');
    if (!token) window.location.href = '/login';

    async function fetchUsers() {
      const response = await fetch('/api/users', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.status === 401 || response.status === 403) {
        window.location.href = '/chat'; // Not allowed
        return;
      }
      const users = await response.json();
      renderUsers(users);
    }

    function renderUsers(users) {
      const tbody = document.getElementById('user-table-body');
      tbody.innerHTML = '';
      users.forEach(user => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${user.username}</td>
          <td><span class="badge ${user.is_admin ? 'admin' : ''}">${user.is_admin ? 'Admin' : 'User'}</span></td>
          <td>
            <button class="delete-btn" onclick="removeUser('${user.username}')" ${user.username === 'admin' ? 'disabled' : ''}>Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function addUser() {
      const username = document.getElementById('new-username').value;
      const password = document.getElementById('new-password').value;
      const isAdmin = document.getElementById('is-admin').checked;
      const errorDiv = document.getElementById('form-error');
      
      errorDiv.textContent = '';

      const response = await fetch('/api/users', {
        method: 'POST',
        headers: { 
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password, is_admin: isAdmin })
      });

      if (response.ok) {
        document.getElementById('new-username').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('is-admin').checked = false;
        fetchUsers();
      } else {
        const err = await response.json();
        errorDiv.textContent = err.detail || 'Failed to add user';
      }
    }

    async function removeUser(username) {
      if (!confirm(`Are you sure you want to delete ${username}?`)) return;

      const response = await fetch(`/api/users/${username}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (response.ok) {
        fetchUsers();
      } else {
        alert('Failed to delete user');
      }
    }

    fetchUsers();
  </script>
</body>
</html>
